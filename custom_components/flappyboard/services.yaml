send_message:
  name: Send message
  description: >-
    Send a message to a FlappyBoard display with full control over animation,
    flip speed, and alignment.
  fields:
    device_id:
      name: Device
      description: The FlappyBoard display to send the message to.
      required: true
      selector:
        device:
          integration: flappyboard
    message:
      name: Message
      description: >-
        Text to display. Use newlines to create multiple rows. Supports inline
        color tags, e.g. "<color='red'>DELAYED</color>".
      required: true
      example: "GATE 12\nNOW BOARDING"
      selector:
        text:
          multiline: true
    flip_speed:
      name: Flip speed
      description: >-
        Speed multiplier for this message. 1.0 = default, 2.0 = twice as fast,
        0.5 = half speed. Omit to use the board's configured default.
      example: 2.0
      selector:
        number:
          min: 0.1
          max: 10.0
          step: 0.1
          mode: box
    transition_animation:
      name: Transition animation
      description: >-
        How cells flip when the new message appears. Omit to use the board's
        configured default.
      selector:
        select:
          options:
            - label: None (all cells simultaneously)
              value: none
            - label: Staggered start (rows top to bottom)
              value: staggered_start
            - label: Top to bottom (with full spins)
              value: top_to_bottom
            - label: Bottom to top (with full spins)
              value: bottom_to_top
            - label: Left to right (with full spins)
              value: left_to_right
            - label: Right to left (with full spins)
              value: right_to_left
            - label: Row by row (reading order)
              value: row_by_row
            - label: Dissolve (random start times)
              value: dissolve
            - label: Diagonal (NW to SE)
              value: diagonal
            - label: Middle out
              value: middle_out
            - label: Outside in
              value: outside_in
            - label: Spiral (clockwise from top-left)
              value: spiral
            - label: Hatch (alternating rows)
              value: hatch
            - label: Snake up (boustrophedon from bottom)
              value: snake_up
            - label: Matrix (random column offsets)
              value: matrix
            - label: Random (picks one each time)
              value: random
    center_h:
      name: Center horizontally
      description: Center each row of text within its column.
      default: false
      selector:
        boolean:
    center_v:
      name: Center vertically
      description: Center the rows vertically within the board.
      default: false
      selector:
        boolean:
